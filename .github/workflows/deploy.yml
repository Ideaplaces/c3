# Configure these in GitHub repo Settings > Secrets and Variables
#
# Required secrets:
#   ACR_LOGIN_SERVER       - Azure Container Registry login server (e.g. myregistry.azurecr.io)
#   ACR_NAME               - Azure Container Registry name (e.g. myregistry)
#   AZURE_CREDENTIALS      - Azure service principal credentials JSON
#   AZURE_RESOURCE_GROUP   - Azure resource group name
#   AZURE_CONTAINER_APP    - Azure Container Apps app name
#   C3_PUBLIC_URL          - Public URL for the app (e.g. https://c3.example.com)
#   DISCORD_WEBHOOK_DEPLOY - Discord webhook URL for failure notifications (optional)

name: Test, Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vitest run

  build-and-deploy:
    name: Build and Deploy
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/c3:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/c3:${{ github.sha }}
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_BASE_URL=${{ secrets.C3_PUBLIC_URL }}
            C3_MODE=marketing
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/c3:buildcache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/c3:buildcache,mode=max

      - name: Deploy new revision
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/c3:${{ github.sha }}

      - name: Wait for deployment to be healthy
        run: |
          FQDN=$(az containerapp show \
            --name ${{ secrets.AZURE_CONTAINER_APP }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          HEALTH_URL="https://${FQDN}/api/health"
          echo "Health check: $HEALTH_URL"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" --max-time 5 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Healthy after ${i} attempts"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, waiting..."
            sleep 5
          done
          echo "Failed to become healthy after 150 seconds"
          exit 1

      - name: Discord notification on failure
        if: failure()
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | sed 's/"/\\"/g')
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_DEPLOY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \":x: c3 — Build/deploy failed\",
                \"description\": \"**Commit:** ${COMMIT_MSG}\n**Branch:** main\n**By:** ${{ github.actor }}\",
                \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                \"color\": 15158332,
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"
