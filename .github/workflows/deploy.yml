name: Build and Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: app-ideaplaces-c3
  ACR_LOGIN_SERVER: acrideaplaces.azurecr.io
  IMAGE_NAME: c3

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_BASE_URL=https://c3.ideaplaces.com \
            --build-arg C3_MODE=marketing \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:prod-${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:prod-${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to production
        run: |
          az webapp config container set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group rg-ideaplaces \
            --container-image-name "${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:prod-${{ github.sha }}" \
            --container-registry-url "https://${{ env.ACR_LOGIN_SERVER }}" \
            --container-registry-user "${{ secrets.ACR_USERNAME }}" \
            --container-registry-password "${{ secrets.ACR_PASSWORD }}"
          echo "Container config updated, waiting for restart..."

      - name: Wait for production to be healthy
        run: |
          PROD_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health"

          echo "Waiting for container restart..."
          sleep 20

          echo "Polling until new container is healthy..."
          SEEN_DOWN=false
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL" --max-time 5 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              if [ "$SEEN_DOWN" = true ] || [ "$i" -gt 5 ]; then
                echo "Production healthy after ${i} attempts"
                exit 0
              fi
              echo "Attempt $i: still seeing old container (HTTP $STATUS), waiting..."
            else
              SEEN_DOWN=true
              echo "Attempt $i: container restarting (HTTP $STATUS)..."
            fi
            sleep 5
          done
          echo "Production failed to become healthy after 5 minutes"
          exit 1
